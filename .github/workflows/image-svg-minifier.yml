name: SVG Minifier
on:
  pull_request:
    paths :
      - "**.svg"
  push:
    paths :
      - "**.svg"
  workflow_dispatch:

jobs:
  svgs:
    name: SVGs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ericcornelissen/svgo-action@v4.0.9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}